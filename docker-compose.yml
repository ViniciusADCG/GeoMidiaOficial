services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geomidia}
      POSTGRES_USER: ${POSTGRES_USER:-geomidia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geomidia}
    ports:
      - "5433:5432"
    volumes:
      - geomidia_postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-geomidia}:${POSTGRES_PASSWORD:-geomidia}@db:5432/${POSTGRES_DB:-geomidia}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      CREATE_TABLES: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  geomidia_postgres_data:
