name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: geomidia_test
          POSTGRES_USER: geomidia
          POSTGRES_PASSWORD: geomidia
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U geomidia -d geomidia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://geomidia:geomidia@localhost:5432/geomidia_test
      JWT_SECRET: ci-only-secret-with-more-than-32-characters
      CREATE_TABLES: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - run: pip install -r requirements-dev.txt
        working-directory: backend
      - run: alembic upgrade head
        working-directory: backend
      - run: ruff check app tests
        working-directory: backend
      - run: pytest
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
